#
# Saumon dotfiles
# Dotbot headless configuration file
#

---

- defaults:
    link:
      relink: true

- create:
    ~/.ssh:
      mode: 0700

- link:
    ~/.config/fish:
    ~/.config/bat:
    ~/.config/git:
    ~/.config/htop:
    ~/.config/lsd:
    ~/.config/ripgrep:
    ~/.tmux.conf:
    ~/.vim:

- clean:
    ~/:
    ~/.config:
      recursive: true

- shell:
    - [git submodule update --init --recursive, Updating git submodules]
    - [vim "+PlugInstall" "+PlugUpdate" +qa, Updating vim plugins]
