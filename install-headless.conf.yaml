#
# Saumon dotfiles
# Dotbot headless configuration file
#

---

- defaults:
    link:
      create: true
      relink: true

- create:
    ~/.ssh:
      mode: 0700

- link:
    ~/.config/bat: config/bat
    ~/.config/fish: config/fish
    ~/.config/git: config/git
    ~/.config/htop: config/htop
    ~/.config/lsd: config/lsd
    ~/.config/ripgrep: config/ripgrep
    ~/.tmux.conf:
    ~/.vim:

- clean:
    ~/:
    ~/.config:
      recursive: true

- shell:
    - [git submodule update --init --recursive, Updating git submodules]
    - [vim "+PlugInstall" "+PlugUpdate" +qa, Updating vim plugins]
