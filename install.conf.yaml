#
# Saumon dotfiles
# Dotbot configuration file
#

---

- defaults:
    link:
      create: true
      relink: true

- create:
    ~/.ssh:
      mode: 0700

- link:
    ~/.config/:
      create: true
      glob: true
      path: config/*
      exclude: [user-dirs.dirs]
    ~/.config/user-dirs.dirs:
      force: true
      path: config/user-dirs.dirs
    ~/.gtkrc-2.0:
      force: true
    ~/.icons/default/index.theme:
      create: true
      force: true
      path: icons/default/index.theme
    ~/.local/share/:
      create: true
      glob: true
      path: local/share/*
      exclude: [local/share/gnupg]
    ~/.local/share/gnupg/gpg-agent.conf:
      create: true
      path: local/share/gnupg/gpg-agent.conf
    ~/.mozilla/firefox/:
      create: true
      glob: true
      path: mozilla/firefox/*
    ~/.tmux.conf:
    ~/.vim:
    ~/.Xmodmap:
    ~/.Xresources:

- clean:
    ~/:
    ~/.config:
      recursive: true

- shell:
    - [git submodule update --init --recursive, Updating git submodules]
    - [fisher update, Updating fish plugins]
    - [vim "+PlugInstall" "+PlugUpdate" +qa, Updating vim plugins]
